{% load wagtailcore_tags %}

<nav id="main-nav" aria-label="Main Navigation">
    <ol role="list">
        {% for menu_item in menu_items %}
            <li>
                <a href="{% pageurl menu_item %}" class="link-unstyled">{{ menu_item.title }}</a>
            </li>
        {% endfor %}
    </ol>
</nav>
