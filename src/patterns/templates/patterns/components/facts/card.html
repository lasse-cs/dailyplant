{% load wagtailcore_tags %}

<article class="fact__card card">
    <header class="fact__header">
        {% if fact.heading_level == 'h2' %}
            <h2 class="fact__title">
                {{ fact.title }}
            </h2>
        {% else %}
            <h1 class="fact__title">
                {{ fact.title }}
            </h1>
        {% endif %}
        <p class="fact__eyebrow">Fact of the Day</p>
        <p class="fact__date"><time datetime="{{ fact.date|date:'Y-m-d'}}">{{ fact.date|date:'M d, Y' }}</time></p>
    </header>
    <div class="fact__card__body">
        {{ fact.content|richtext }}
        <ol class="fact__references" role="list">
            {% for block in fact.references %}
                <li>
                    {% include_block block %}
                </li>
            {% endfor %}
        </ol>
    </div>
</article>
