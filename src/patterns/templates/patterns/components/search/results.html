{% if query and results %}
    <ul class="command-search__list" role="list">
        {% for result in results %}
            <li>
                {% include result.search_result_template with result=result %}
            </li>
        {% endfor %}
    </ul>
{% elif query %}
    <p class="command-search__empty">No results for "{{ query }}".</p>
{% endif %}
