version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/django
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]