{% load wagtailcore_tags %}

<a
    class="command-search__result"
    href="{% pageurl result %}"
>
    <span class="command-search__result-title">{{ result.title }}</span>
    {% if result.first_published_at %}
        <span class="command-search__result-date"><time datetime="{{ result.first_published_at|date:'Y-m-d' }}">{{ result.first_published_at|date:'M d, Y' }}</time></span>
    {% endif %}
    <span class="command-search__result-description">{{ result.metadata_description }}</span>
</a>
