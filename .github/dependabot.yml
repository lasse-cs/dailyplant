version: 2

multi-ecosystem-groups:
  docker:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/django
    multi-ecosystem-group: docker
    patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: /
    multi-ecosystem-group: docker
    patterns: ["*"]