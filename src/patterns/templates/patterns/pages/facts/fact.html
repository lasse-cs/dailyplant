{% extends "patterns/base.html" %}

{% load wagtailcore_tags %}

{% block content %}
    <h1>{{ page.title }}</h1>
    <p>{{ page.content|richtext }}</p>
    {% for block in page.references %}
        <ul>
            <li>
                {% include_block block %}
            </li>
        </ul>
    {% endfor %}
{% endblock content %}
